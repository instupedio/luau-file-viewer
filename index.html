<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luau Mobile Checker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #eee; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        #drop-zone { border: 3px dashed #555; padding: 50px 20px; text-align: center; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        #drop-zone.dragover { background: #1a1a1a; border-color: #0f0; }
        textarea, pre { width: 100%; font-family: monospace; font-size: 15px; }
        textarea { background: #1e1e1e; color: #ddd; border: 1px solid #444; padding: 12px; height: 280px; resize: vertical; }
        pre { background: #1e1e1e; padding: 15px; overflow: auto; max-height: 400px; border-radius: 8px; border: 1px solid #333; }
        button { padding: 14px 28px; background: #00ccff; color: #000; font-weight: bold; border: none; border-radius: 8px; margin: 8px 4px; cursor: pointer; font-size: 16px; }
        button:active { transform: scale(0.95); }
        #file-info { margin: 15px 0; font-size: 14px; }
        .section { margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Luau / Lua Mobile File Inspector</h1>
        <p>Drop or upload → Raw edit → Live results preview → Copy code</p>
        
        <div id="drop-zone">
            <p>📤 Drop .lua or .luau file here or tap to select</p>
            <input type="file" id="file-input" accept=".lua,.luau" style="display:none;">
        </div>
        
        <div id="file-info"></div>
        
        <div class="section">
            <h2>Raw Edit (Edit here)</h2>
            <textarea id="editor" spellcheck="false" placeholder="Your code appears here..."></textarea>
        </div>
        
        <div class="section">
            <h2>Results / Highlighted Preview</h2>
            <pre id="preview"><code id="code-block" class="language-lua"></code></pre>
            <button onclick="copyResults()">📋 Copy Results Code</button>
            <button onclick="checkSyntax()">🔍 Run Basic Syntax Check</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const editor = document.getElementById('editor');
        const previewCode = document.getElementById('code-block');
        const fileInfo = document.getElementById('file-info');

        // Upload handlers
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                editor.value = content;           // Show in raw edit
                fileInfo.innerHTML = `<strong>File:</strong> ${file.name} | <strong>Size:</strong> ${(file.size/1024).toFixed(1)} KB`;
                updatePreview(content);
            };
            reader.readAsText(file);
        }

        // Live sync from raw edit to results
        editor.addEventListener('input', () => {
            updatePreview(editor.value);
        });

        function updatePreview(content) {
            previewCode.textContent = content || '// No code loaded yet...';
            Prism.highlightElement(previewCode);
        }

        function copyResults() {
            const textToCopy = previewCode.textContent;
            if (!textToCopy || textToCopy.includes('// No code')) {
                alert("Nothing to copy yet – load a file first!");
                return;
            }
            navigator.clipboard.writeText(textToCopy).then(() => {
                const origText = event.target.textContent;
                event.target.textContent = '✅ Copied!';
                setTimeout(() => event.target.textContent = '📋 Copy Results Code', 2000);
            }).catch(() => alert("Copy failed – try long-press on the preview box"));
        }

        function checkSyntax() {
            const code = editor.value.trim();
            if (!code) {
                alert("Paste or load some code first!");
                return;
            }
            let issues = [];
            const ifCount = (code.match(/if\b/g) || []).length;
            const endCount = (code.match(/end\b/g) || []).length;
            if (ifCount !== endCount) issues.push(`Mismatched if/end blocks (${ifCount} ifs vs ${endCount} ends)`);
            if (code.includes("local") && !code.match(/function|=/)) issues.push("Check local variable declarations");
            if ((code.match(/{/g) || []).length !== (code.match(/}/g) || []).length) issues.push("Possible bracket mismatch");
            
            if (issues.length === 0) {
                alert("✅ Clean! No obvious syntax issues detected.");
            } else {
                alert("⚠️ Potential issues:\n\n" + issues.join("\n"));
            }
            updatePreview(code); // Refresh results
        }

        // Keyboard support for mobile-ish
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                alert("Changes saved in browser – use Download if needed (add later)");
            }
        });
    </script>
</body>
</html>
